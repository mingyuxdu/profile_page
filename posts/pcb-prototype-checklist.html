          <p class="article-meta">2026-05-08 · 电子设计文章</p>
        </header>

        <section>
          <h2>下单前检查</h2>
          <ul>
            <li>电源输入范围、保护电路和关键电流路径是否清晰。</li>
            <li>封装、丝印方向、连接器方向和机械边界是否匹配实物。</li>
            <li>调试点、测试点、跳线和备用接口是否足够。</li>
            <li>BOM 中是否存在长交期、停产或替代困难的器件。</li>
          </ul>
        </section>

        <section>
          <h2>可测试性</h2>
          <p>
            小批量原型的价值在于快速暴露问题。调试口、测试点和清晰的版本标识通常比
            过早追求外观完整更重要。
          </p>
        </section>
