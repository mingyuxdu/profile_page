        <section>
          <h2>问题背景</h2>
          <p>
            科研和工程开发通常包含文献阅读、方案比较、实验记录、代码实现和结果表达。
            AI 工具适合承担结构化整理、初稿生成、代码检查和方案推演，但关键判断仍需要
            由研究者完成。
          </p>
        </section>

        <section>
          <h2>工作流</h2>
          <ol>
            <li>把研究问题拆成明确的技术假设和验证任务。</li>
            <li>使用 AI 生成阅读提纲、实验记录模板和代码草稿。</li>
            <li>用真实数据、实验现象和专业知识逐项校验输出。</li>
            <li>将结论沉淀为可复用的笔记、脚本和技术文档。</li>
          </ol>
        </section>
